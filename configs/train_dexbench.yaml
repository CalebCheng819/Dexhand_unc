defaults:
  - log.yaml
  - model: dexbench_diffusion.yaml
  - dataset: dexbench_hdf5.yaml
  - _self_

name: 'dexbench_diffusion_rot_euler_seed2025'
seed: 2025

gpu:
  - 0

log_every_n_steps: 50

training:
  total_iters: 200
  save_dir: '${output_dir}/state_dict'
  save_every_n_epoch: 20
  val_every_n_epoch: 20
  enable_validation: true

  lr: 1e-4
  betas: [0.95, 0.999]
  weight_decay: 1e-6
  rotation_loss_weight: 1.0
